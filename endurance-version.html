<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>んぽちゃむと問題を解こう！ | 学習ログ</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --blue: #2563eb;
      --green: #0f766e;
      --red: #dc2626;
      --amber: #f59e0b;
      --shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    ruby {
      ruby-align: center;
    }

    rt {
      color: var(--muted);
      font-size: 0.5em;
      font-weight: 700;
      line-height: 1;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 54px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.35;
    }

    h2 {
      font-size: 24px;
      line-height: 1.35;
    }

    main {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2vw, 20px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .start {
      display: grid;
      gap: 18px;
      padding: 22px;
    }

    .start-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .label-title {
      display: inline-block;
      min-height: 34px;
      line-height: 1.25;
      white-space: nowrap;
    }

    input,
    select {
      width: 100%;
      min-height: 52px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fbfcfe;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .toggle {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #fbfcfe;
      font-size: 17px;
      white-space: nowrap;
    }

    .toggle-text {
      display: inline-block;
      line-height: 1.2;
    }

    .toggle input {
      width: 22px;
      height: 22px;
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .download-btn {
      border-color: var(--green);
      background: var(--green);
      color: #ffffff;
    }

    [hidden] {
      display: none !important;
    }

    #startBtn {
      width: 100%;
    }

    .workspace {
      display: none;
      gap: 14px;
    }

    .workspace.active {
      display: grid;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-height: 78px;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric b {
      font-size: 28px;
      line-height: 1.1;
    }

    .metric span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .task {
      position: relative;
      display: grid;
      gap: 18px;
      padding: clamp(14px, 2.4vw, 24px);
      overflow: hidden;
    }

    .question {
      min-height: 96px;
      display: grid;
      place-items: center;
      padding: 10px;
      text-align: center;
    }

    .question strong {
      font-size: clamp(34px, 5.5vw, 56px);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .choices[data-count="4"] {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .choices[data-count="6"] {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .choice {
      min-height: 238px;
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      gap: 10px;
      padding: 14px;
      border: 3px solid var(--line);
      background: #ffffff;
    }

    .choice-label {
      color: var(--muted);
      font-size: 17px;
      font-weight: 800;
    }

    .dot-board {
      width: min(100%, 260px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      padding: 18px;
      border: 2px solid #e5eaf1;
      border-radius: 8px;
      background: #fbfcfe;
    }

    .dot-cell {
      display: grid;
      place-items: center;
    }

    .dot {
      width: clamp(22px, 5.8vw, 36px);
      height: clamp(22px, 5.8vw, 36px);
      border-radius: 999px;
      background: var(--green);
      border: 2px solid #115e59;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .action-btn {
      min-height: 78px;
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      text-align: left;
    }

    .action-btn svg {
      width: 38px;
      height: 38px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
    }

    .rest-btn {
      border-color: #f3c678;
      background: #fff8eb;
      color: #92400e;
    }

    .end-btn {
      border-color: #fecaca;
      background: #fff1f2;
      color: var(--red);
    }

    .button-text {
      display: block;
      font-size: 22px;
      line-height: 1.15;
    }

    .button-text rt {
      font-size: 0.48em;
    }

    .rest-overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.95);
      z-index: 2;
    }

    .rest-overlay.show {
      display: grid;
    }

    .rest-box {
      width: min(340px, 100%);
      display: grid;
      gap: 12px;
      place-items: center;
      padding: 26px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .rest-box b {
      color: var(--blue);
      font-size: clamp(38px, 8vw, 56px);
      line-height: 1;
    }

    .done {
      display: none;
      gap: 16px;
      padding: 28px;
      text-align: center;
    }

    .done.active {
      display: grid;
    }

    .done-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      text-align: left;
    }

    .done-stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .done-stat b {
      display: block;
      font-size: 28px;
    }

    .done-stat span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .done-note {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.7;
      text-align: left;
    }

    @media (max-width: 760px) {
      header {
        display: grid;
        padding: 12px;
      }

      .start-grid {
        grid-template-columns: 1fr;
      }

      .choices {
        gap: 10px;
      }

      .choices[data-count="4"],
      .choices[data-count="6"] {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice {
        min-height: 190px;
        padding: 10px;
      }

      .dot-board {
        padding: 12px;
        gap: 8px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 460px) {
      main {
        padding: 10px;
      }

      .start,
      .task,
      .done {
        padding: 14px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .question {
        min-height: 82px;
      }

      .question strong {
        font-size: 34px;
      }

      .choice {
        min-height: 156px;
      }

      .dot-board {
        gap: 6px;
      }

      .choice-label {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1><ruby>ちゃむうと</ruby><ruby>問題<rt>もんだい</rt></ruby>をとこう</h1>
    </header>

    <main>
      <section class="start card" id="startScreen">
        <h2><ruby>始<rt>はじ</rt></ruby>める<ruby>前<rt>まえ</rt></ruby></h2>
        <div class="start-grid">
          <label>
            <span class="label-title"><ruby>番号<rt>ばんごう</rt></ruby></span>
            <input id="participantInput" type="text" value="P001" autocomplete="off">
          </label>
          <label>
            <span class="label-title"><ruby>休<rt>やす</rt></ruby>む<ruby>時間<rt>じかん</rt></ruby></span>
            <select id="restSecondsInput">
              <option value="5">5秒</option>
              <option value="10" selected>10秒</option>
              <option value="20">20秒</option>
              <option value="30">30秒</option>
              <option value="45">45秒</option>
              <option value="60">1分</option>
            </select>
          </label>
          <label class="toggle">
            <input id="timerToggle" type="checkbox" checked>
            <span class="toggle-text"><ruby>時間<rt>じかん</rt></ruby>を<ruby>見<rt>み</rt></ruby>せる</span>
          </label>
          <button class="primary" id="startBtn">
            <ruby>始<rt>はじ</rt></ruby>める
          </button>
        </div>
      </section>

      <section class="workspace" id="workspace">
        <div class="metrics">
          <div class="metric">
            <b id="answeredText">0</b>
            <span><ruby>答<rt>こた</rt></ruby>えた<ruby>数<rt>かず</rt></ruby></span>
          </div>
          <div class="metric" id="timerMetric">
            <b id="timeText">0秒</b>
            <span><ruby>時間<rt>じかん</rt></ruby></span>
          </div>
        </div>

        <section class="task card">
          <div class="question">
            <strong>
              いちばん<ruby>多<rt>おお</rt></ruby>いのは？
            </strong>
          </div>

          <div class="choices" id="choices"></div>

          <div class="actions">
            <button class="action-btn rest-btn" id="restBtn" type="button">
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <path d="M13 28h22a6 6 0 0 1 6 6v2H7v-2a6 6 0 0 1 6-6Z"></path>
                <path d="M15 28V15a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v13"></path>
                <path d="M12 36v5M36 36v5"></path>
              </svg>
              <span class="button-text"><ruby>休<rt>やす</rt></ruby>む</span>
            </button>
            <button class="action-btn end-btn" id="endBtn" type="button">
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <rect x="12" y="12" width="24" height="24" rx="4"></rect>
              </svg>
              <span class="button-text"><ruby>終<rt>お</rt></ruby>わる</span>
            </button>
          </div>

          <div class="rest-overlay" id="restOverlay">
            <div class="rest-box">
              <p><ruby>少<rt>すこ</rt></ruby>し<ruby>休<rt>やす</rt></ruby>みます</p>
              <b id="restCount">10</b>
            </div>
          </div>
        </section>
      </section>

      <section class="done card" id="doneScreen">
        <h2><ruby>終<rt>お</rt></ruby>わりました</h2>
        <div class="done-stats">
          <div class="done-stat">
            <b id="doneAnsweredText">0</b>
            <span><ruby>答<rt>こた</rt></ruby>えた<ruby>数<rt>かず</rt></ruby></span>
          </div>
          <div class="done-stat">
            <b id="doneTimeText">0秒</b>
            <span><ruby>時間<rt>じかん</rt></ruby></span>
          </div>
        </div>
        <p class="done-note" id="doneNoteText">データを<ruby>送信中<rt>そうしんちゅう</rt></ruby>です。</p>
        <button class="download-btn" id="downloadCsvBtn" type="button" disabled hidden>
          CSVを<ruby>保存<rt>ほぞん</rt></ruby>する
        </button>
        <button class="primary" id="restartBtn">
          <ruby>最初<rt>さいしょ</rt></ruby>に<ruby>戻<rt>もど</rt></ruby>る
        </button>
      </section>
    </main>
  </div>

  <script src="collector-config.js"></script>
  <script src="endurance-version.js"></script>
</body>
</html>
